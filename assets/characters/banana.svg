<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -100 100 120" width="100" height="120">
    <g transform="translate(0, 10)">
        <!-- Banana Stem -->
        <polygon points="-5,-60 0,-65 5,-60 2,-50 -2,-50" fill="#8B4513" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
        
        <!-- Banana Body - Left Face -->
        <polygon points="-2,-50 -15,-20 -10,10 0,20 5,5 0,-20 2,-50" fill="#FFD700" stroke="#DAA520" stroke-width="2" stroke-linejoin="round"/>
        
        <!-- Banana Body - Right Face -->
        <polygon points="2,-50 0,-20 5,5 0,20 15,0 10,-25" fill="#FFE4B5" stroke="#DAA520" stroke-width="2" stroke-linejoin="round"/>
        
        <!-- Banana Tip -->
        <polygon points="0,20 5,25 10,22 5,5" fill="#654321" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
        
        <!-- Eyes (Nano size) -->
        <circle cx="-5" cy="-10" r="2" fill="#000"/>
        <circle cx="5" cy="-10" r="2" fill="#000"/>
        <!-- Cute Smile -->
        <path d="M -3 -4 Q 0 0 3 -4" fill="none" stroke="#000" stroke-width="1.5"/>
    </g>
</svg>